    <title>رادار | دليلك الأول للمحلات القريبة</title>
    <meta name="description" content="تطبيق رادار هو دليلك الشامل لاستكشاف المتاجر والمطاعم والخدمات القريبة منك. تسوق أونلاين، ابحث عن المنتجات، وتواصل مع التجار بسهولة من خلال خريطتنا التفاعلية." />

    <style>
      :root {
        --background: #f5f6f8;
        --text-primary: #1a1d26;
        --font-family: "Tajawal", "Cairo", "Segoe UI", Tahoma, sans-serif;
      }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: var(--background);
        color: var(--text-primary);
        font-family: var(--font-family);
      }
      #root {
        min-height: 100vh;
      }
      .app-boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 18%, rgba(245, 192, 0, 0.18), transparent 40%),
          radial-gradient(circle at 82% 74%, rgba(245, 192, 0, 0.08), transparent 38%),
          linear-gradient(180deg, #f8f9fb 0%, #f3f5f8 100%);
        box-sizing: border-box;
      }
      .app-boot__card {
        width: min(360px, 92vw);
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 22px 18px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(232, 230, 224, 0.95);
        box-shadow: 0 18px 42px rgba(26, 29, 38, 0.1);
      }
      .app-boot__logo-wrap {
        width: 96px;
        height: 96px;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, rgba(245, 192, 0, 0.2), rgba(245, 192, 0, 0.08));
        border: 1px solid rgba(245, 192, 0, 0.32);
        animation: bootPulse 1.4s ease-in-out infinite;
      }
      .app-boot__logo {
        width: 72px;
        height: 72px;
        object-fit: contain;
        display: block;
      }
      .app-boot__title {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 900;
        color: #1a1d26;
      }
      .app-boot__sub {
        margin: 0;
        color: #5f6672;
        font-size: 0.92rem;
        font-weight: 700;
      }
      .app-boot__dots {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }
      .app-boot__dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #f5c000;
        opacity: 0.35;
        animation: bootDot 1.2s ease-in-out infinite;
      }
      .app-boot__dot:nth-child(2) { animation-delay: 0.16s; }
      .app-boot__dot:nth-child(3) { animation-delay: 0.32s; }
      @keyframes bootPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 192, 0, 0.28); }
        50% { transform: scale(1.03); box-shadow: 0 0 0 12px rgba(245, 192, 0, 0); }
      }
      @keyframes bootDot {
        0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
        40% { opacity: 1; transform: translateY(-4px); }
      }
    </style>

  <body>
    <!-- إن بقي هذا النص ظاهراً بدون واجهة، فالمشكلة غالباً تحميل الـ JS (راجع F12 → Console) وليست «صفحة بيضاء» فقط -->
    <div id="root">
      <div class="app-boot" role="status" aria-live="polite" aria-label="جاري تحميل التطبيق">
        <div class="app-boot__card">
          <div class="app-boot__logo-wrap">
